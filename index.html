// ═══════════ CSV PARSER ═══════════
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  // Auto-detect separator: if first line has more semicolons than commas, use semicolon
  const firstLine = lines[0];
  const commas = (firstLine.match(/,/g) || []).length;
  const semis = (firstLine.match(/;/g) || []).length;
  const sep = semis > commas ? ';' : ',';
  const headers = parseCSVLine(lines[0], sep);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line, sep);
    const row = {};
    headers.forEach((h, i) => { row[h] = vals[i] || ''; });
    return row;
  }).filter(r => r.TICKER && r.TICKER.trim());
}

function parseCSVLine(line, sep) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === sep && !inQuotes) { result.push(current.trim()); current = ''; }
    else { current += ch; }
  }
  result.push(current.trim());
  return result;
}

function sheetToCompanies(rows) {
  // Parse number handling commas as decimal separator
  const num = v => {
    if (v === null || v === undefined || v === '') return null;
    let s = String(v).replace('%','').replace(/\s/g,'').replace(',','.');
    const n = parseFloat(s);
    return isNaN(n) ? null : n;
  };
  // Parse percentage from sheet: values are decimals (0.14 = 14%) or text with % ("4,98%")
  const pct = v => {
    if (v === null || v === undefined || v === '') return null;
    const sv = String(v);
    const hasPctSign = sv.includes('%');
    let s = sv.replace('%','').replace(/\s/g,'').replace(',','.');
    let n = parseFloat(s);
    if (isNaN(n)) return null;
    if (hasPctSign) return Math.round(n * 10) / 10;
    return Math.round(n * 1000) / 10;
  };
  return rows.map(r => {
    // Parse DPS from individual year columns (DPS_2012, DPS_2013, etc.)
    let dps = [];
    for (let y = 2012; y <= 2030; y++) {
      const v = num(r['DPS_' + y]);
      if (v !== null && v > 0) dps.push({ y: y, d: v });
    }
    // Fallback: try DPS_HISTORICO format "2012:0.8|2013:0.92"
    if (dps.length === 0 && r.DPS_HISTORICO) {
      dps = r.DPS_HISTORICO.split('|').map(p => {
        const [y, d] = p.split(':');
        return { y: parseInt(y), d: parseFloat(String(d).replace(',','.')) };
      }).filter(d => !isNaN(d.y) && !isNaN(d.d));
    }
    return {
      t: r.TICKER,
      n: r.NOMBRE,
      s: num(r.PUNTUACION),
      l: r.LECTURA,
      sec: r.SECTOR,
      grp: r.GRUPO,
      yrs: parseInt(r['AÑOS_INC']) || parseInt(r['ANOS_INC']) || 0,
      pay: pct(r.PAYOUT),
      cfp: pct(r.CF_PAYOUT),
      dne: num(r.DN_EBITDA),
      mn: pct(r.MARGEN_NETO),
      roic: pct(r.ROIC),
      dg5: pct(r.CREC_DPS_5A),
      dg1: pct(r.CREC_DPS_1A),
      eg5: pct(r.CREC_EPS_5A),
      pcm: num(r.PRECIO_COMPRA),
      daf: num(r.DIV_ANUAL_FWD),
      dps: dps,
      pr: num(r.PRECIO_LIVE),
      rpd: num(r.RPD_LIVE),
      ppc: num(r.PCT_A_PC),
      _live: !!num(r.PRECIO_LIVE)
    };
  }).filter(c => c.s && c.s > 0).sort((a, b) => b.s - a.s);
}

// ═══════════ CONFIG ═══════════
const COLORS = {"Muy Seguro":"#16a34a","Seguro":"#2563eb","Limite":"#d97706","No Seguro":"#dc2626"};
const LABELS = {"Muy Seguro":"MUY SEGURO","Seguro":"SEGURO","Limite":"LÍMITE","No Seguro":"NO SEGURO"};
const BG = {"Muy Seguro":"#f0fdf4","Seguro":"#eff6ff","Limite":"#fffbeb","No Seguro":"#fef2f2"};

const {useState,useMemo,useEffect,createElement:h} = React;

// ═══════════ DATA LOADER HOOK ═══════════
function useSheetData() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [isLive, setIsLive] = useState(false);
  const [lastUpdate, setLastUpdate] = useState(null);

  useEffect(() => {
    async function load() {
      try {
        const res = await fetch(SHEET_CSV_URL);
        if (!res.ok) throw new Error('fetch failed');
        const text = await res.text();
        const rows = parseCSV(text);
        if (rows.length > 0) {
          const companies = sheetToCompanies(rows);
          if (companies.length > 0) {
            setData(companies);
            setIsLive(companies.some(c => c._live));
            setLastUpdate(new Date());
            setLoading(false);
            return;
          }
        }
        throw new Error('no data');
      } catch (e) {
        console.warn('Google Sheets unavailable, using fallback:', e.message);
        setData(FALLBACK);
        setIsLive(false);
        setLoading(false);
      }
    }
    load();
    // Refresh every 10 minutes
    const iv = setInterval(load, 600000);
    return () => clearInterval(iv);
  }, []);

  return { data, loading, isLive, lastUpdate };
}

// ═══════════ COMPONENTS ═══════════
function ScoreRing({score,lectura,size}){
  size=size||100;
  const r=(size-10)/2,ci=2*Math.PI*r,co=COLORS[lectura]||"#888";
  return h("svg",{width:size,height:size,style:{display:"block"}},
    h("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:"#e5e7eb",strokeWidth:7}),
    h("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:co,strokeWidth:7,strokeDasharray:ci,strokeDashoffset:ci*(1-score/100),strokeLinecap:"round",transform:`rotate(-90 ${size/2} ${size/2})`,style:{transition:"stroke-dashoffset 0.8s ease"}}),
    h("text",{x:size/2,y:size/2-4,textAnchor:"middle",fontSize:24,fontWeight:800,fill:co},score),
    h("text",{x:size/2,y:size/2+13,textAnchor:"middle",fontSize:8,fontWeight:700,fill:co,letterSpacing:"0.8"},LABELS[lectura])
  );
}

function BarChart({dps,color}){
  if(!dps||dps.length<2) return h("div",{style:{color:"#aaa",fontSize:12,padding:16}},"Sin datos");
  const mx=Math.max(...dps.map(d=>d.d));
  const cH=100;
  return h("div",{style:{padding:"8px 0",width:"100%"}},
    h("div",{style:{display:"flex",alignItems:"flex-end",gap:2,width:"100%",height:cH+28}},
      dps.map((d,i)=>{
        const ht=mx>0?(d.d/mx)*cH:0;const last=i===dps.length-1;
        return h("div",{key:i,style:{display:"flex",flexDirection:"column",alignItems:"center",flex:1,minWidth:0}},
          h("div",{style:{fontSize:8,fontWeight:600,color:last?color:"#aaa",marginBottom:2,fontFamily:"monospace",whiteSpace:"nowrap"}},d.d.toFixed(2)),
          h("div",{style:{width:"80%",height:Math.max(2,ht),borderRadius:"3px 3px 0 0",background:last?color:color+"30",transition:"height 0.5s ease"}}),
          h("div",{style:{fontSize:7,color:"#bbb",marginTop:2,fontFamily:"monospace"}},String(d.y).slice(2))
        );
      })
    )
  );
}

function MetricRow({label,value,unit,good}){
  if(value===null||value===undefined) return null;
  const dv=unit==="%"?value+"%":unit==="x"?value+"x":value;
  const co=good===true?"#16a34a":good===false?"#dc2626":"#374151";
  return h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #f3f4f6"}},
    h("span",{style:{fontSize:12,color:"#6b7280"}},label),
    h("span",{style:{fontSize:12,fontWeight:700,color:co,fontFamily:"monospace"}},dv)
  );
}

function Detail({c,onClose}){
  const co=COLORS[c.l];
  return h("div",{onClick:onClose,style:{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",background:"rgba(0,0,0,0.45)",padding:"20px 10px",overflowY:"auto"}},
    h("div",{onClick:e=>e.stopPropagation(),style:{background:"white",borderRadius:16,maxWidth:480,width:"100%",overflow:"hidden",boxShadow:"0 25px 60px rgba(0,0,0,0.25)",margin:"20px 0"}},
      h("div",{style:{background:BG[c.l],padding:"24px 20px 18px",borderBottom:`3px solid ${co}`,position:"relative"}},
        h("button",{onClick:onClose,style:{position:"absolute",top:10,right:10,background:"rgba(0,0,0,0.06)",border:"none",borderRadius:20,width:30,height:30,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}},"✕"),
        h("div",{style:{display:"flex",alignItems:"center",gap:16}},
          h(ScoreRing,{score:c.s,lectura:c.l}),
          h("div",{style:{flex:1}},
            h("div",{style:{fontSize:11,fontWeight:700,color:"#9ca3af",letterSpacing:1}},c.t),
            h("div",{style:{fontSize:17,fontWeight:800,color:"#111",lineHeight:1.2}},c.n),
            h("div",{style:{fontSize:11,color:"#6b7280",marginTop:3}},c.sec+" · "+c.grp),
            h("div",{style:{display:"flex",gap:14,marginTop:6,flexWrap:"wrap"}},
              h("span",{style:{fontSize:11,fontWeight:600,color:co}},c.yrs+" años increm."),
              c.rpd&&h("span",{style:{fontSize:11,fontWeight:600,color:"#374151"}},"RPD: "+c.rpd.toFixed(2)+"%",c._live&&h("span",{style:{fontSize:9,color:"#16a34a"}}," ●"))
            )
          )
        )
      ),
      h("div",{style:{padding:"14px 20px 22px"}},
        c._live&&c.pr&&h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#f9fafb",borderRadius:8,padding:"10px 12px",marginBottom:14,border:"1px solid #e5e7eb"}},
          h("div",null,
            h("div",{style:{fontSize:10,color:"#9ca3af",fontWeight:600}},"PRECIO EN TIEMPO REAL"),
            h("div",{style:{fontSize:20,fontWeight:800,fontFamily:"monospace"}},"$"+c.pr)
          ),
          c.rpd&&h("div",{style:{textAlign:"right"}},
            h("div",{style:{fontSize:10,color:"#9ca3af",fontWeight:600}},"RPD ACTUAL"),
            h("div",{style:{fontSize:18,fontWeight:800,fontFamily:"monospace",color:co}},c.rpd.toFixed(2)+"%")
          )
        ),
        h("div",{style:{fontSize:10,fontWeight:700,color:"#9ca3af",letterSpacing:1.5,marginBottom:4}},"MÉTRICAS FUNDAMENTALES"),
        h("div",{style:{marginBottom:14}},
          h(MetricRow,{label:"Payout Ratio (EPS)",value:c.pay,unit:"%",good:c.pay!==null?c.pay>0&&c.pay<75:null}),
          h(MetricRow,{label:"CF Payout Ratio",value:c.cfp,unit:"%",good:c.cfp!==null?c.cfp>0&&c.cfp<75:null}),
          h(MetricRow,{label:"Deuda Neta / EBITDA",value:c.dne,unit:"x",good:c.dne!==null?c.dne<3:null}),
          h(MetricRow,{label:"Margen Neto",value:c.mn,unit:"%",good:c.mn!==null?c.mn>10:null}),
          h(MetricRow,{label:"ROIC",value:c.roic,unit:"%",good:c.roic!==null?c.roic>8:null}),
          h(MetricRow,{label:"Crec. DPS 5a (CAGR)",value:c.dg5,unit:"%",good:c.dg5!==null?c.dg5>3:null}),
          h(MetricRow,{label:"Crec. DPS 1a",value:c.dg1,unit:"%",good:c.dg1!==null?c.dg1>0:null}),
          h(MetricRow,{label:"Crec. EPS 5a (CAGR)",value:c.eg5,unit:"%",good:c.eg5!==null?c.eg5>3:null})
        ),
        h("div",{style:{fontSize:10,fontWeight:700,color:"#9ca3af",letterSpacing:1.5,marginBottom:2}},"DIVIDENDO POR ACCIÓN (DPS)"),
        h("div",{style:{background:"#fafaf8",borderRadius:10,padding:"10px 12px",marginBottom:14,width:"100%",overflow:"hidden"}},h(BarChart,{dps:c.dps,color:co})),
        (c.pr||c.pcm)&&h("div",null,
          h("div",{style:{fontSize:10,fontWeight:700,color:"#9ca3af",letterSpacing:1.5,marginBottom:6}},"VALORACIÓN",c._live&&h("span",{style:{color:"#16a34a",fontSize:9}}," ● EN VIVO")),
          h("div",{style:{background:"#f9fafb",borderRadius:10,padding:12}},
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
              c.pr&&h("div",null,h("div",{style:{fontSize:9,color:"#9ca3af"}},"Precio"+(c._live?" (live)":"")),h("div",{style:{fontSize:14,fontWeight:700,fontFamily:"monospace"}},"$"+c.pr)),
              c.pcm&&h("div",null,h("div",{style:{fontSize:9,color:"#9ca3af"}},"Mi Precio de Compra"),h("div",{style:{fontSize:14,fontWeight:700,fontFamily:"monospace"}},"$"+c.pcm))
            ),
            c.ppc!==null&&c.ppc!==undefined&&h("div",{style:{marginTop:8,fontSize:12,fontWeight:600,padding:"5px 10px",borderRadius:6,color:c.pr&&c.pcm&&c.pr<c.pcm?"#16a34a":"#6b7280",background:c.pr&&c.pcm&&c.pr<c.pcm?"#f0fdf4":"#f9fafb"}},
              c.pr&&c.pcm?(c.pr<c.pcm?"↓ Cotiza "+Math.abs(Math.round((1-c.pr/c.pcm)*1000)/10)+"% por debajo del precio de compra":"↑ Cotiza "+Math.abs(Math.round((c.pr/c.pcm-1)*1000)/10)+"% por encima del precio de compra"):"")
            )
          )
        )
      )
    )
  );
}

// ═══════════ MAIN APP ═══════════
function App(){
  const {data,loading,isLive,lastUpdate}=useSheetData();
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("Todas");
  const [selected,setSelected]=useState(null);
  const [sort,setSort]=useState("score");

  const filtered=useMemo(()=>{
    if(!data) return [];
    let l=data;
    if(search){const q=search.toLowerCase();l=l.filter(c=>c.t.toLowerCase().includes(q)||c.n.toLowerCase().includes(q));}
    if(filter!=="Todas")l=l.filter(c=>c.l===filter);
    if(sort==="score")l=[...l].sort((a,b)=>b.s-a.s);
    else if(sort==="name")l=[...l].sort((a,b)=>a.n.localeCompare(b.n));
    else if(sort==="yield")l=[...l].sort((a,b)=>(b.rpd||0)-(a.rpd||0));
    else if(sort==="years")l=[...l].sort((a,b)=>b.yrs-a.yrs);
    return l;
  },[data,search,filter,sort]);

  const counts=useMemo(()=>{
    if(!data) return {"Todas":0};
    const c={"Todas":data.length};data.forEach(d=>{c[d.l]=(c[d.l]||0)+1;});return c;
  },[data]);

  if(loading) return h("div",{style:{minHeight:"100vh",background:"#fafaf8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
    h("div",{className:"loader"}),
    h("div",{style:{marginTop:16,fontSize:13,color:"#9ca3af"}},"Cargando datos...")
  );

  return h("div",{style:{minHeight:"100vh",background:"#fafaf8"}},
    h("div",{style:{background:"linear-gradient(135deg,#0f2b1a 0%,#1a4d2e 50%,#0d3320 100%)",color:"white",padding:"28px 20px 20px",textAlign:"center"}},
      h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:3,opacity:.5}},"DIVIDENDO SEGURO"),
      h("h1",{style:{fontSize:22,fontWeight:800,margin:"4px 0 0"}},"Scoring de Seguridad del Dividendo"),
      h("p",{style:{fontSize:11,opacity:.5,marginTop:4}},(data?data.length:0)+" empresas · Metodología propia"),
      isLive&&lastUpdate&&h("div",{style:{fontSize:10,marginTop:6,opacity:.7,display:"flex",alignItems:"center",justifyContent:"center",gap:4}},
        h("span",{style:{width:6,height:6,borderRadius:3,background:"#4ade80",display:"inline-block"}}),
        "Precios en vivo · "+lastUpdate.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})
      )
    ),
    h("div",{style:{maxWidth:640,margin:"0 auto",padding:"14px 14px 60px"}},
      h("input",{type:"text",placeholder:"Buscar ticker o nombre...",value:search,onChange:e=>setSearch(e.target.value),style:{width:"100%",padding:"10px 14px",border:"1px solid #e5e7eb",borderRadius:10,fontSize:14,outline:"none",marginBottom:10,background:"white"}}),
      h("div",{style:{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}},
        ["Todas","Muy Seguro","Seguro","Limite","No Seguro"].map(f=>
          h("button",{key:f,onClick:()=>setFilter(f),style:{padding:"5px 11px",borderRadius:18,border:"1px solid",fontSize:11,fontWeight:600,cursor:"pointer",background:filter===f?(COLORS[f]||"#111"):"white",color:filter===f?"white":(COLORS[f]||"#374151"),borderColor:filter===f?(COLORS[f]||"#111"):"#e5e7eb"}},
            (LABELS[f]||f)+" ("+(counts[f]||0)+")"
          )
        )
      ),
      h("div",{style:{display:"flex",gap:4,marginBottom:12}},
        [["score","Puntuación"],["yield","Yield"],["years","Años"],["name","Nombre"]].map(([k,v])=>
          h("button",{key:k,onClick:()=>setSort(k),style:{padding:"3px 9px",borderRadius:6,border:"1px solid #e5e7eb",fontSize:10,cursor:"pointer",fontWeight:sort===k?700:400,background:sort===k?"#f3f4f6":"white"}},v)
        )
      ),
      h("div",{style:{display:"flex",flexDirection:"column",gap:5}},
        filtered.map(c=>{
          const co=COLORS[c.l];
          return h("div",{key:c.t,onClick:()=>setSelected(c),
            style:{background:"white",border:"1px solid #e5e7eb",borderRadius:10,padding:"11px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,borderLeft:`4px solid ${co}`,transition:"box-shadow 0.15s,transform 0.15s"},
            onMouseEnter:e=>{e.currentTarget.style.boxShadow="0 3px 10px rgba(0,0,0,0.06)";e.currentTarget.style.transform="translateY(-1px)";},
            onMouseLeave:e=>{e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="none";}},
            h("div",{style:{minWidth:40,height:40,borderRadius:20,background:BG[c.l],display:"flex",alignItems:"center",justifyContent:"center"}},
              h("span",{style:{fontSize:14,fontWeight:800,color:co}},c.s)
            ),
            h("div",{style:{flex:1,minWidth:0}},
              h("div",{style:{display:"flex",alignItems:"baseline",gap:5}},
                h("span",{style:{fontSize:13,fontWeight:700}},c.t),
                h("span",{style:{fontSize:11,color:"#9ca3af",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},c.n)
              ),
              h("div",{style:{fontSize:10,color:"#9ca3af",marginTop:1}},c.yrs+"a"+(c.rpd?" · RPD "+c.rpd.toFixed(2)+"%":"")+(c._live?" ●":""))
            ),
            c._live&&c.pr?
              h("div",{style:{textAlign:"right",flexShrink:0}},
                h("div",{style:{fontSize:13,fontWeight:700,fontFamily:"monospace"}},"$"+c.pr)
              ):
              h("span",{style:{fontSize:9,fontWeight:700,padding:"3px 7px",borderRadius:10,background:BG[c.l],color:co,whiteSpace:"nowrap",flexShrink:0}},LABELS[c.l])
          );
        })
      ),
      filtered.length===0&&h("div",{style:{textAlign:"center",padding:40,color:"#9ca3af"}},"Sin resultados"),
      h("div",{style:{textAlign:"center",marginTop:24,fontSize:10,color:"#b0b0b0",lineHeight:1.6}},"DividendoSeguro · Metodología propia",h("br"),"Esto no es asesoramiento financiero")
    ),
    selected&&h(Detail,{c:selected,onClose:()=>setSelected(null)})
  );
}

ReactDOM.render(h(App),document.getElementById("root"));
</script>
