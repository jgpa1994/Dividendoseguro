<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DividendoSeguro — Scoring de Seguridad del Dividendo</title>
<meta name="description" content="Análisis de seguridad del dividendo con metodología propia. Scoring cuantitativo + cualitativo de +80 empresas.">
<meta property="og:title" content="DividendoSeguro — Scoring de Seguridad del Dividendo">
<meta property="og:description" content="Puntuación de 0 a 100 que mide la probabilidad de que una empresa mantenga y aumente su dividendo.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;background:#fafaf8;color:#1a1a18;-webkit-font-smoothing:antialiased}
input,button,select{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.loader{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#16a34a;border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
.container{max-width:1100px;margin:0 auto;padding:20px 24px}
header{text-align:center;padding:40px 0 32px}
header h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:#1a1a18}
header p{font-size:14px;color:#6b7280;margin-top:6px}
.substack-cta{display:inline-block;margin-top:12px;padding:8px 20px;background:#16a34a;color:#fff;font-size:13px;font-weight:600;border-radius:8px;text-decoration:none;transition:background .2s}
.substack-cta:hover{background:#15803d}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.controls input[type="text"]{flex:1;min-width:200px;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;background:#fff;outline:none;transition:border .2s}
.controls input[type="text"]:focus{border-color:#16a34a}
.controls select{padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:13px;background:#fff;outline:none;cursor:pointer}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:0.3px;white-space:nowrap}
.badge-ms{background:#f0fdf4;color:#16a34a}
.badge-s{background:#eff6ff;color:#2563eb}
.badge-l{background:#fffbeb;color:#d97706}
.badge-ns{background:#fef2f2;color:#dc2626}
table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
thead th{background:#f9fafb;padding:10px 12px;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;text-align:left;border-bottom:1.5px solid #e5e7eb;position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:#1a1a18}
thead th .sort-arrow{font-size:10px;margin-left:3px;opacity:0.4}
thead th.sorted .sort-arrow{opacity:1;color:#16a34a}
tbody tr{cursor:pointer;transition:background .15s}
tbody tr:hover{background:#f0fdf4}
tbody td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f3f4f6;white-space:nowrap}
.td-ticker{font-weight:700;color:#1a1a18}
.td-name{color:#6b7280;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.td-score{font-weight:700}
.td-num{font-variant-numeric:tabular-nums;text-align:right}
.positive{color:#16a34a}
.negative{color:#dc2626}
.neutral{color:#6b7280}
.ficha-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;overflow-y:auto;animation:fadeIn .2s ease}
.ficha{max-width:740px;margin:24px auto;background:#fafaf8;border-radius:16px;padding:32px 28px;position:relative;animation:fadeIn .25s ease}
.ficha-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:24px;cursor:pointer;color:#6b7280;padding:4px 8px;border-radius:8px;transition:background .15s}
.ficha-close:hover{background:#f3f4f6}
.ficha-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.ficha-avatar{width:52px;height:52px;border-radius:12px;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#2563eb}
.ficha-title{font-size:20px;font-weight:700}
.ficha-subtitle{font-size:13px;color:#6b7280;margin-top:2px}
.ficha-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.ficha-metric{background:#f3f4f6;border-radius:10px;padding:14px;text-align:center}
.ficha-metric-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.ficha-metric-value{font-size:26px;font-weight:700}
.ficha-metric-sub{font-size:11px;margin-top:2px}
.ficha-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.ficha-row-item{background:#f3f4f6;border-radius:10px;padding:10px 14px;text-align:center}
.ficha-row-item .label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.ficha-row-item .value{font-size:17px;font-weight:700}
.ficha-section{background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.ficha-section-title{font-size:14px;font-weight:700;margin-bottom:4px}
.ficha-section-sub{font-size:12px;color:#6b7280;margin-bottom:12px}
.growth-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px}
.growth-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid #f3f4f6}
.growth-row:last-child{border-bottom:none}
.growth-label{color:#6b7280}
.growth-value{font-weight:600}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:16px 20px}
.chart-card-title{font-size:14px;font-weight:700;margin-bottom:2px}
.chart-card-sub{font-size:12px;color:#6b7280;margin-bottom:10px}
.chart-wrap{position:relative;height:180px}
.ficha-cta{background:#f0fdf4;border-radius:12px;padding:16px;text-align:center;margin-top:8px}
.ficha-cta p{font-size:13px;color:#15803d}
.ficha-cta a{color:#15803d;font-weight:700;text-decoration:underline}
.footer{text-align:center;padding:32px 0 24px;font-size:12px;color:#9ca3af}
.footer a{color:#16a34a;text-decoration:none}
@media(max-width:700px){
  .ficha-metrics,.ficha-row{grid-template-columns:1fr}
  .charts-grid{grid-template-columns:1fr}
  .growth-grid{grid-template-columns:1fr}
  .ficha{margin:12px;padding:24px 18px}
  .controls{flex-direction:column}
  .controls input[type="text"],.controls select{width:100%}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════ CONFIG ═══════════
const CSV_MAIN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7TvXApvkoaEqz_SpGlb6_GRBXJhDGOS6DOWvVBZDIO8ettzhTI1pu4VnbRT-2j62Iym8Xl0_HZY9d/pub?gid=2013921486&single=true&output=csv";
const CSV_HIST = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7TvXApvkoaEqz_SpGlb6_GRBXJhDGOS6DOWvVBZDIO8ettzhTI1pu4VnbRT-2j62Iym8Xl0_HZY9d/pub?gid=769696979&single=true&output=csv";

const COLORS = {"Muy Seguro":"#16a34a","Seguro":"#2563eb","Limite":"#d97706","No Seguro":"#dc2626"};
const BG_COLORS = {"Muy Seguro":"#f0fdf4","Seguro":"#eff6ff","Limite":"#fffbeb","No Seguro":"#fef2f2"};
const BADGE_CLS = {"Muy Seguro":"badge-ms","Seguro":"badge-s","Limite":"badge-l","No Seguro":"badge-ns"};

// ═══════════ CSV PARSER ═══════════
function detectSeparator(line) {
  const semicolons = (line.match(/;/g) || []).length;
  const commas = (line.match(/,/g) || []).length;
  return semicolons > commas ? ";" : ",";
}

function parseCSVLine(line, sep) {
  const result = [];
  let current = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === sep && !inQuotes) { result.push(current.trim()); current = ""; }
    else { current += ch; }
  }
  result.push(current.trim());
  return result;
}

function parseCSV(text) {
  const lines = text.split("\n").filter(l => l.trim());
  if (lines.length < 2) return [];
  const sep = detectSeparator(lines[0]);
  const headers = parseCSVLine(lines[0], sep);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line, sep);
    const row = {};
    headers.forEach((h, i) => { row[h] = vals[i] || ""; });
    return row;
  });
}

function num(v) {
  if (v === "" || v === undefined || v === null) return null;
  const n = parseFloat(String(v).replace(",", ".").replace("%", ""));
  return isNaN(n) ? null : n;
}

function pct(v) {
  const n = num(v);
  if (n === null) return null;
  return Math.abs(n) < 1 ? n * 100 : n;
}

function fmtPct(v, decimals) {
  if (v === null || v === undefined) return "—";
  const d = decimals !== undefined ? decimals : 1;
  const sign = v > 0 ? "+" : "";
  return sign + v.toFixed(d) + "%";
}

function fmtNum(v, d) {
  if (v === null || v === undefined) return "—";
  return v.toFixed(d !== undefined ? d : 2);
}

// ═══════════ DATA PROCESSING ═══════════
function processMain(rows) {
  return rows.filter(r => r.TICKER && r.TICKER.trim()).map(r => ({
    ticker: r.TICKER.trim(),
    name: r.NOMBRE || "",
    score: num(r.PUNTUACION),
    reading: r.LECTURA || "",
    sector: r.SECTOR || "",
    group: r.GRUPO || "",
    yrsInc: num(r["AÑOS_INC"]),
    payout: pct(r.PAYOUT),
    cfPayout: pct(r.CF_PAYOUT),
    dnEbitda: num(r.DN_EBITDA),
    marginNeto: pct(r.MARGEN_NETO),
    roic: pct(r.ROIC),
    crecDps5: pct(r.CREC_DPS_5A),
    crecDps1: pct(r.CREC_DPS_1A),
    crecEps5: pct(r.CREC_EPS_5A),
    buyPrice: num(r.PRECIO_COMPRA),
    divFwd: num(r.DIV_ANUAL_FWD),
    priceLive: num(r.PRECIO_LIVE),
    rpdLive: pct(r.RPD_LIVE),
    pctToBuy: pct(r.PCT_A_PC),
    rpdMedia5: pct(r.RPD_MEDIA_5A),
    crecDpsE1: pct(r.CREC_DPS_E1),
    dps: [2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025].map(y => ({
      year: y, value: num(r["DPS_" + y])
    })).filter(d => d.value !== null)
  }));
}

function processHist(rows) {
  const map = {};
  rows.forEach(r => {
    const t = (r.TIKR || r.TICKER || "").trim();
    if (!t) return;
    if (!map[t]) map[t] = [];
    map[t].push({
      year: num(r["AÑO"]) || num(r.AÑO),
      eps: num(r.EPS),
      cfps: num(r.CFPS),
      dps: num(r.DPS),
      mn: pct(r.MN),
      roic: pct(r.ROIC),
      dnEbitda: num(r.DN_EBITDA),
      affops: num(r.AFFOPS),
      affoPayout: pct(r.AFFO_PAYOUT),
      epsPayout: pct(r.EPS_PAYOUT),
      cfpsPayout: pct(r.CFPS_PAYOUT)
    });
  });
  Object.keys(map).forEach(t => { map[t].sort((a, b) => a.year - b.year); });
  return map;
}

// ═══════════ RENDER ═══════════
let companies = [];
let histData = {};
let selectedTicker = null;
let searchTerm = "";
let filterSector = "";
let filterReading = "";
let sortCol = "score";
let sortDir = -1;

async function loadData() {
  document.getElementById("app").innerHTML = '<div class="container"><header><h1>DividendoSeguro</h1><p>Scoring de seguridad del dividendo · +80 empresas analizadas</p></header><div class="loader"></div></div>';
  try {
    const [r1, r2] = await Promise.all([fetch(CSV_MAIN), fetch(CSV_HIST)]);
    const [t1, t2] = await Promise.all([r1.text(), r2.text()]);
    companies = processMain(parseCSV(t1));
    histData = processHist(parseCSV(t2));
    render();
  } catch (e) {
    document.getElementById("app").innerHTML = '<div class="container" style="text-align:center;padding:60px"><p style="color:#dc2626">Error cargando datos. Recarga la página.</p></div>';
  }
}

function render() {
  let filtered = companies.filter(c => {
    if (searchTerm && !c.ticker.toLowerCase().includes(searchTerm.toLowerCase()) && !c.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
    if (filterSector && c.sector !== filterSector) return false;
    if (filterReading && c.reading !== filterReading) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === "string") va = va.toLowerCase();
    if (typeof vb === "string") vb = vb.toLowerCase();
    if (va === null || va === undefined) return 1;
    if (vb === null || vb === undefined) return -1;
    if (va < vb) return -sortDir;
    if (va > vb) return sortDir;
    return 0;
  });

  const sectors = [...new Set(companies.map(c => c.sector))].filter(Boolean).sort();
  const readings = [...new Set(companies.map(c => c.reading))].filter(Boolean);

  let html = `<div class="container">
    <header>
      <h1>DividendoSeguro</h1>
      <p>Scoring de seguridad del dividendo · ${companies.length} empresas analizadas</p>
      <a href="https://dividendoseguro.substack.com" target="_blank" class="substack-cta">Suscríbete a la newsletter</a>
    </header>
    <div class="controls">
      <input type="text" id="search" placeholder="Buscar empresa o ticker..." value="${searchTerm}">
      <select id="filterSector"><option value="">Todos los sectores</option>${sectors.map(s => `<option value="${s}" ${s === filterSector ? "selected" : ""}>${s}</option>`).join("")}</select>
      <select id="filterReading"><option value="">Todas las lecturas</option>${readings.map(r => `<option value="${r}" ${r === filterReading ? "selected" : ""}>${r}</option>`).join("")}</select>
    </div>
    <div style="overflow-x:auto">
    <table>
      <thead><tr>
        ${tableHeader("ticker", "Ticker")}
        ${tableHeader("name", "Empresa")}
        ${tableHeader("score", "Puntuación")}
        <th>Lectura</th>
        ${tableHeader("sector", "Sector")}
        ${tableHeader("rpdLive", "RPD")}
        ${tableHeader("yrsInc", "Años Inc.")}
        ${tableHeader("priceLive", "Precio")}
        ${tableHeader("buyPrice", "P. Compra")}
        ${tableHeader("pctToBuy", "% vs Compra")}
      </tr></thead>
      <tbody>`;

  filtered.forEach(c => {
    const scoreColor = COLORS[c.reading] || "#6b7280";
    const badgeCls = BADGE_CLS[c.reading] || "";
    const pctClass = c.pctToBuy !== null ? (c.pctToBuy <= 0 ? "positive" : "negative") : "neutral";
    html += `<tr onclick="openFicha('${c.ticker}')">
      <td class="td-ticker">${c.ticker}</td>
      <td class="td-name">${c.name}</td>
      <td class="td-score" style="color:${scoreColor}">${c.score !== null ? Math.round(c.score) : "—"}</td>
      <td><span class="badge ${badgeCls}">${c.reading || "—"}</span></td>
      <td style="font-size:12px">${c.sector}</td>
      <td class="td-num">${c.rpdLive !== null ? c.rpdLive.toFixed(2) + "%" : "—"}</td>
      <td class="td-num">${c.yrsInc !== null ? Math.round(c.yrsInc) : "—"}</td>
      <td class="td-num">${c.priceLive !== null ? "$" + c.priceLive.toFixed(2) : "—"}</td>
      <td class="td-num">${c.buyPrice !== null ? "$" + Math.round(c.buyPrice) : "—"}</td>
      <td class="td-num ${pctClass}">${c.pctToBuy !== null ? fmtPct(c.pctToBuy, 1) : "—"}</td>
    </tr>`;
  });

  html += `</tbody></table></div>
    <div class="footer">
      <p>DividendoSeguro © ${new Date().getFullYear()} · Metodología propia · No es asesoramiento financiero</p>
      <p style="margin-top:4px"><a href="https://dividendoseguro.substack.com" target="_blank">Newsletter</a></p>
    </div>
  </div>`;

  document.getElementById("app").innerHTML = html;

  document.getElementById("search").addEventListener("input", e => { searchTerm = e.target.value; render(); });
  document.getElementById("filterSector").addEventListener("change", e => { filterSector = e.target.value; render(); });
  document.getElementById("filterReading").addEventListener("change", e => { filterReading = e.target.value; render(); });
}

function tableHeader(col, label) {
  const arrow = sortCol === col ? (sortDir === 1 ? "▲" : "▼") : "▲";
  const cls = sortCol === col ? "sorted" : "";
  return `<th class="${cls}" onclick="toggleSort('${col}')">${label} <span class="sort-arrow">${arrow}</span></th>`;
}

function toggleSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = col === "ticker" || col === "name" || col === "sector" ? 1 : -1; }
  render();
}

// ═══════════ FICHA ═══════════
function openFicha(ticker) {
  selectedTicker = ticker;
  const c = companies.find(x => x.ticker === ticker);
  if (!c) return;
  const hist = histData[ticker] || [];
  const scoreColor = COLORS[c.reading] || "#6b7280";
  const pctClass = c.pctToBuy !== null ? (c.pctToBuy <= 0 ? "positive" : "negative") : "";
  const pctSign = c.pctToBuy !== null ? (c.pctToBuy > 0 ? "+" : "") : "";

  const rpdMedia5 = c.rpdMedia5;

  const isReit = c.group === "REIT";

  let fichaHtml = `<div class="ficha-overlay" onclick="if(event.target===this)closeFicha()">
    <div class="ficha">
      <button class="ficha-close" onclick="closeFicha()">✕</button>
      <div class="ficha-header">
        <div class="ficha-avatar">${c.ticker}</div>
        <div>
          <div class="ficha-title">${c.name}</div>
          <div class="ficha-subtitle">${c.sector}${c.group ? " · " + c.group : ""}</div>
        </div>
      </div>

      <div class="ficha-metrics">
        <div class="ficha-metric">
          <div class="ficha-metric-label">Puntuación</div>
          <div class="ficha-metric-value" style="color:${scoreColor}">${c.score !== null ? Math.round(c.score) : "—"}</div>
          <div class="ficha-metric-sub" style="color:${scoreColor}">${c.reading}</div>
        </div>
        <div class="ficha-metric">
          <div class="ficha-metric-label">Precio compra</div>
          <div class="ficha-metric-value">${c.buyPrice !== null ? "$" + Math.round(c.buyPrice) : "—"}</div>
          <div class="ficha-metric-sub ${pctClass}">${c.pctToBuy !== null ? pctSign + c.pctToBuy.toFixed(1) + "% sobre objetivo" : "—"}</div>
        </div>
        <div class="ficha-metric">
          <div class="ficha-metric-label">Dividendo FWD</div>
          <div class="ficha-metric-value">${c.divFwd !== null ? "$" + fmtNum(c.divFwd) : "—"}</div>
          <div class="ficha-metric-sub" style="color:#6b7280">${c.yrsInc !== null ? Math.round(c.yrsInc) + " años de incremento" : ""}</div>
        </div>
      </div>

      <div class="ficha-row">
        <div class="ficha-row-item">
          <div class="label">Precio live</div>
          <div class="value">${c.priceLive !== null ? "$" + c.priceLive.toFixed(2) : "—"}</div>
        </div>
        <div class="ficha-row-item">
          <div class="label">RPD actual</div>
          <div class="value">${c.rpdLive !== null ? c.rpdLive.toFixed(2) + "%" : "—"}</div>
        </div>
        <div class="ficha-row-item">
          <div class="label">RPD media 5A</div>
          <div class="value">${rpdMedia5 !== null ? rpdMedia5.toFixed(2) + "%" : "—"}</div>
        </div>
      </div>`;

  // Growth section
  const crecDpsEst = c.crecDpsE1;

  fichaHtml += `<div class="ficha-section">
    <div class="ficha-section-title">Crecimiento</div>
    <div class="growth-grid">
      <div class="growth-row"><span class="growth-label">Crec. EPS 5A</span><span class="growth-value ${c.crecEps5 !== null ? (c.crecEps5 >= 0 ? 'positive' : 'negative') : ''}">${c.crecEps5 !== null ? fmtPct(c.crecEps5) : "—"}</span></div>
      <div class="growth-row"><span class="growth-label">Crec. DPS 5A</span><span class="growth-value ${c.crecDps5 !== null ? (c.crecDps5 >= 0 ? 'positive' : 'negative') : ''}">${c.crecDps5 !== null ? fmtPct(c.crecDps5) : "—"}</span></div>
      <div class="growth-row"><span class="growth-label">Crec. DPS 1A</span><span class="growth-value ${c.crecDps1 !== null ? (c.crecDps1 >= 0 ? 'positive' : 'negative') : ''}">${c.crecDps1 !== null ? fmtPct(c.crecDps1) : "—"}</span></div>
      <div class="growth-row"><span class="growth-label">Crec. DPS est. +1A</span><span class="growth-value ${crecDpsEst !== null ? (crecDpsEst >= 0 ? 'positive' : 'negative') : ''}">${crecDpsEst !== null ? fmtPct(crecDpsEst) : "—"}</span></div>
      <div class="growth-row"><span class="growth-label">Años de incremento</span><span class="growth-value">${c.yrsInc !== null ? Math.round(c.yrsInc) : "—"}</span></div>
    </div>
  </div>`;

  // DPS chart
  if (c.dps.length > 0) {
    fichaHtml += `<div class="ficha-section">
      <div class="ficha-section-title">Dividendo por acción (DPS)</div>
      <div class="ficha-section-sub">Histórico ${c.dps[0].year}–${c.dps[c.dps.length-1].year}</div>
      <div class="chart-wrap"><canvas id="chart-dps"></canvas></div>
    </div>`;
  }

  // Ratio charts
  const ratioCharts = [];
  const payoutData = hist.filter(h => h.epsPayout !== null);
  if (payoutData.length > 1) ratioCharts.push({ id: "chart-payout", title: "Payout ratio (EPS)", current: c.payout, data: payoutData.map(h => ({ year: h.year, value: h.epsPayout })), color: "#16a34a" });

  const cfPayoutData = hist.filter(h => h.cfpsPayout !== null);
  if (cfPayoutData.length > 1) ratioCharts.push({ id: "chart-cfpayout", title: "CF payout ratio", current: c.cfPayout, data: cfPayoutData.map(h => ({ year: h.year, value: h.cfpsPayout })), color: "#7c3aed" });

  const mnData = hist.filter(h => h.mn !== null);
  if (mnData.length > 1) ratioCharts.push({ id: "chart-mn", title: "Margen neto", current: c.marginNeto, data: mnData.map(h => ({ year: h.year, value: h.mn })), color: "#ea580c" });

  const roicData = hist.filter(h => h.roic !== null);
  if (roicData.length > 1) ratioCharts.push({ id: "chart-roic", title: "ROIC", current: c.roic, data: roicData.map(h => ({ year: h.year, value: h.roic })), color: "#2563eb" });

  if (isReit) {
    const affoData = hist.filter(h => h.affoPayout !== null);
    if (affoData.length > 1) ratioCharts.push({ id: "chart-affo", title: "AFFO payout", current: null, data: affoData.map(h => ({ year: h.year, value: h.affoPayout })), color: "#0891b2" });
  }

  if (ratioCharts.length > 0) {
    fichaHtml += `<div class="charts-grid">`;
    ratioCharts.forEach(ch => {
      fichaHtml += `<div class="chart-card">
        <div class="chart-card-title">${ch.title}</div>
        <div class="chart-card-sub">${ch.current !== null ? "Actual: " + ch.current.toFixed(1) + "%" : ""}</div>
        <div class="chart-wrap"><canvas id="${ch.id}"></canvas></div>
      </div>`;
    });
    fichaHtml += `</div>`;
  }

  // DN/EBITDA if available
  const dnData = hist.filter(h => h.dnEbitda !== null);
  if (dnData.length > 1) {
    fichaHtml += `<div class="ficha-section">
      <div class="ficha-section-title">Deuda neta / EBITDA</div>
      <div class="ficha-section-sub">${c.dnEbitda !== null ? "Actual: " + fmtNum(c.dnEbitda, 1) + "x" : ""}</div>
      <div class="chart-wrap"><canvas id="chart-dn"></canvas></div>
    </div>`;
  }

  fichaHtml += `<div class="ficha-cta">
      <p>¿Quieres recibir alertas cuando actualicemos esta empresa?</p>
      <p><a href="https://dividendoseguro.substack.com" target="_blank">Suscríbete gratis a DividendoSeguro</a></p>
    </div>
    </div>
  </div>`;

  const overlay = document.createElement("div");
  overlay.id = "ficha-container";
  overlay.innerHTML = fichaHtml;
  document.body.appendChild(overlay);
  document.body.style.overflow = "hidden";

  // Render charts after DOM is ready
  setTimeout(() => { renderFichaCharts(c, hist, ratioCharts, dnData); }, 50);
}

function renderFichaCharts(c, hist, ratioCharts, dnData) {
  const gridColor = "rgba(0,0,0,0.06)";
  const txtColor = "rgba(0,0,0,0.45)";

  // DPS bar chart
  const dpsCanvas = document.getElementById("chart-dps");
  if (dpsCanvas && c.dps.length > 0) {
    new Chart(dpsCanvas, {
      type: "bar",
      data: {
        labels: c.dps.map(d => String(d.year)),
        datasets: [{
          data: c.dps.map(d => d.value),
          backgroundColor: c.dps.map((_, i) => i === c.dps.length - 1 ? "#2563eb" : "#16a34a"),
          borderRadius: 3,
          barPercentage: 0.7
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => "$" + ctx.parsed.y.toFixed(2) } } },
        scales: {
          x: { grid: { display: false }, ticks: { color: txtColor, font: { size: 10, family: "Manrope" }, maxRotation: 0 } },
          y: { grid: { color: gridColor }, ticks: { color: txtColor, font: { size: 10, family: "Manrope" }, callback: v => "$" + v.toFixed(2) }, beginAtZero: true }
        }
      }
    });
  }

  // Ratio line charts
  ratioCharts.forEach(ch => {
    const canvas = document.getElementById(ch.id);
    if (!canvas || ch.data.length < 2) return;
    new Chart(canvas, {
      type: "line",
      data: {
        labels: ch.data.map(d => String(d.year)),
        datasets: [{
          data: ch.data.map(d => d.value),
          borderColor: ch.color,
          backgroundColor: ch.color + "18",
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          pointBackgroundColor: ch.color,
          borderWidth: 2
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + "%" } } },
        scales: {
          x: { grid: { display: false }, ticks: { color: txtColor, font: { size: 10, family: "Manrope" }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
          y: { grid: { color: gridColor }, ticks: { color: txtColor, font: { size: 10, family: "Manrope" }, callback: v => v.toFixed(0) + "%" }, beginAtZero: true }
        }
      }
    });
  });

  // DN/EBITDA bar chart
  const dnCanvas = document.getElementById("chart-dn");
  if (dnCanvas && dnData.length > 1) {
    new Chart(dnCanvas, {
      type: "bar",
      data: {
        labels: dnData.map(d => String(d.year)),
        datasets: [{
          data: dnData.map(d => d.dnEbitda),
          backgroundColor: dnData.map(d => d.dnEbitda <= 3 ? "#16a34a" : "#d97706"),
          borderRadius: 3,
          barPercentage: 0.7
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + "x" } } },
        scales: {
          x: { grid: { display: false }, ticks: { color: txtColor, font: { size: 10, family: "Manrope" }, maxRotation: 0 } },
          y: { grid: { color: gridColor }, ticks: { color: txtColor, font: { size: 10, family: "Manrope" }, callback: v => v.toFixed(1) + "x" } }
        }
      }
    });
  }
}

function closeFicha() {
  const el = document.getElementById("ficha-container");
  if (el) el.remove();
  document.body.style.overflow = "";
  selectedTicker = null;
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeFicha(); });

// ═══════════ INIT ═══════════
loadData();
</script>
</body>
</html>
